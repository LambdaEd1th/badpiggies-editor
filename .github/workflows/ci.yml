name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux GPU dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Unity asset extraction
        uses: actions/cache@v5
        with:
          path: target/unity_asset_cache
          key: ${{ runner.os }}-unity-assets-${{ hashFiles('build.rs', 'assets/data/Bad-Piggies-2.3.6-Unity-Windows.unitypackage') }}
          restore-keys: ${{ runner.os }}-unity-assets-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: WASM check & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable + wasm32 target + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Cache Unity asset extraction
        uses: actions/cache@v5
        with:
          path: target/unity_asset_cache
          key: wasm-unity-assets-${{ hashFiles('build.rs', 'assets/data/Bad-Piggies-2.3.6-Unity-Windows.unitypackage') }}
          restore-keys: wasm-unity-assets-

      - name: cargo check (wasm32)
        run: cargo check --target wasm32-unknown-unknown

      - name: cargo clippy (wasm32)
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings
