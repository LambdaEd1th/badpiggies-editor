name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: native-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace --all-targets

      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  web:
    name: WASM And Dioxus Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: web-${{ hashFiles('**/Cargo.lock', 'app/assets/data/Bad-Piggies-2.3.6-Unity-Windows.unitypackage') }}
          restore-keys: web-

      - name: Check WASM workspace
        run: cargo check --workspace --target wasm32-unknown-unknown

      - name: Clippy WASM workspace
        run: cargo clippy --workspace --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: Install Web build tools
        run: |
          cargo install dioxus-cli --version 0.7.9 --locked
          cargo install wasm-pack --version 0.15.0 --locked

      - name: Build worker
        run: ./scripts/build-web-worker.sh

      - name: Build renderer
        run: ./scripts/build-web-renderer.sh

      - name: Build Dioxus Web release
        run: dx build --platform web --package badpiggies-editor-app --release --debug-symbols=false
