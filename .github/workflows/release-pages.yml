name: Release And Pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Native binaries ──────────────────────────────────────────────────────────
  build_native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: badpiggies-editor-linux-x86_64
            binary: badpiggies-editor
          - os: ubuntu-latest
            artifact: badpiggies-editor-linux-aarch64
            binary: badpiggies-editor
          - os: macos-latest
            artifact: badpiggies-editor-macos-aarch64
            binary: badpiggies-editor
          - os: windows-latest
            artifact: badpiggies-editor-windows-x86_64
            binary: badpiggies-editor.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GPU dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-release-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: native-release-${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/release/${{ matrix.binary }} ${{ matrix.binary }}
          zip ${{ matrix.artifact }}-${{ github.ref_name }}.zip ${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/release/${{ matrix.binary }} ${{ matrix.binary }}
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath "${{ matrix.artifact }}-${{ github.ref_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.zip

  # ── WASM + Pages artifact ────────────────────────────────────────────────────
  build_wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-release-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-release-${{ runner.os }}-cargo-

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build WASM site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # Disable trunk's built-in wasm-opt: it rejects bulk-memory ops
          # that wasm-bindgen 0.2.115+ emits.  We run wasm-opt manually below.
          sed -i 's/data-wasm-opt="2"/data-wasm-opt="0"/' index.html
          trunk build --release --public-url "/${REPO_NAME}/"

      - name: Optimize WASM
        run: |
          sudo apt-get update -y && sudo apt-get install -y binaryen
          WASM=$(find dist -name '*_bg.wasm' | head -1)
          wasm-opt --all-features -O2 "$WASM" -o "${WASM}.opt"
          mv "${WASM}.opt" "$WASM"

      - name: Package web artifact
        run: zip -r badpiggies-editor-web-${{ github.ref_name }}.zip dist

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: badpiggies-editor-web
          path: badpiggies-editor-web-${{ github.ref_name }}.zip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  # ── GitHub Release ───────────────────────────────────────────────────────────
  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build_native, build_wasm]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true

  # ── Deploy to GitHub Pages ───────────────────────────────────────────────────
  deploy_pages:
    name: Deploy To GitHub Pages
    runs-on: ubuntu-latest
    needs: build_wasm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5