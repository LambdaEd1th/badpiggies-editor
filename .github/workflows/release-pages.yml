name: Release And Pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Native binaries and desktop packages (runtime assets bundled) ──────────
  build_native:
    name: Build Native (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: badpiggies-editor-linux-x86_64
            binary: badpiggies-editor
            package_deb: true
          - os: ubuntu-24.04-arm
            artifact: badpiggies-editor-linux-aarch64
            binary: badpiggies-editor
            package_deb: true
          - os: macos-15
            artifact: badpiggies-editor-macos-aarch64
            binary: badpiggies-editor
            package_app: true
          - os: windows-2025-vs2026
            artifact: badpiggies-editor-windows-x86_64
            binary: badpiggies-editor.exe
            package_zip: true
          - os: windows-11-arm
            artifact: badpiggies-editor-windows-aarch64
            binary: badpiggies-editor.exe
            package_zip: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GPU dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            dpkg-dev \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: native-release-${{ matrix.artifact }}-cargo-${{ hashFiles('**/Cargo.lock', 'assets/data/Bad-Piggies-2.3.6-Unity-Windows.unitypackage') }}
          restore-keys: native-release-${{ matrix.artifact }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-bundle
        if: matrix.package_app == true || matrix.package_deb == true
        run: cargo install cargo-bundle --locked --version 0.10.0

      - name: Build macOS app bundle
        if: matrix.package_app == true
        run: cargo bundle --release --format osx

      - name: Package macOS app bundle
        if: matrix.package_app == true
        run: |
          APP_PATH=$(find target/release/bundle/osx -maxdepth 1 -name '*.app' -print -quit)
          test -n "$APP_PATH"
          cp -R assets "$APP_PATH/Contents/Resources/assets"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "${{ matrix.artifact }}-app-${{ github.ref_name }}.zip"

      - name: Build Debian package
        if: matrix.package_deb == true
        run: cargo bundle --release --format deb

      - name: Package Debian bundle artifact
        if: matrix.package_deb == true
        run: |
          DEB_PATH=$(find target/release/bundle/deb -maxdepth 1 -name '*.deb' -print -quit)
          test -n "$DEB_PATH"
          DEB_FILE="${{ matrix.artifact }}-${{ github.ref_name }}.deb"
          cp "$DEB_PATH" "$DEB_FILE"
          zip -r "${{ matrix.artifact }}-${{ github.ref_name }}-deb.zip" "$DEB_FILE" assets

      - name: Package binary (Unix)
        if: matrix.package_zip == true && runner.os != 'Windows'
        run: |
          cp target/release/${{ matrix.binary }} ${{ matrix.binary }}
          zip -r ${{ matrix.artifact }}-${{ github.ref_name }}.zip ${{ matrix.binary }} assets

      - name: Package binary (Windows)
        if: matrix.package_zip == true && runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/release/${{ matrix.binary }} ${{ matrix.binary }}
          Compress-Archive -Path @("${{ matrix.binary }}", "assets") -DestinationPath "${{ matrix.artifact }}-${{ github.ref_name }}.zip"

      - name: Upload binary artifact
        if: matrix.package_zip == true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}-${{ github.ref_name }}.zip

      - name: Upload macOS app artifact
        if: matrix.package_app == true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-app
          path: ${{ matrix.artifact }}-app-${{ github.ref_name }}.zip

      - name: Upload Debian artifact
        if: matrix.package_deb == true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-deb
          path: ${{ matrix.artifact }}-${{ github.ref_name }}-deb.zip

  # ── WASM + Pages artifact (runtime assets copied into dist/) ───────────────
  build_wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-release-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'assets/data/Bad-Piggies-2.3.6-Unity-Windows.unitypackage') }}
          restore-keys: wasm-release-${{ runner.os }}-cargo-

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build WASM site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # Disable trunk's built-in wasm-opt: it rejects bulk-memory ops
          # that wasm-bindgen 0.2.115+ emits.  We run wasm-opt manually below.
          sed -i 's/data-wasm-opt="2"/data-wasm-opt="0"/' index.html
          trunk build --release --public-url "/${REPO_NAME}/"

      - name: Optimize WASM
        run: |
          sudo apt-get update -y && sudo apt-get install -y binaryen
          WASM=$(find dist -name '*_bg.wasm' | head -1)
          wasm-opt --all-features -O2 "$WASM" -o "${WASM}.opt"
          mv "${WASM}.opt" "$WASM"

      - name: Package web artifact
        run: zip -r badpiggies-editor-web-${{ github.ref_name }}.zip dist

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: badpiggies-editor-web
          path: badpiggies-editor-web-${{ github.ref_name }}.zip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  # ── GitHub Release ───────────────────────────────────────────────────────────
  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build_native, build_wasm]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true

  # ── Deploy to GitHub Pages ───────────────────────────────────────────────────
  deploy_pages:
    name: Deploy To GitHub Pages
    runs-on: ubuntu-latest
    needs: build_wasm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5